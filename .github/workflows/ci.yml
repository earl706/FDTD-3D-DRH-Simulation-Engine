name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q --ignore=tests/test_engine_integration.py -m "not integration and not slow"
      - name: Build wheel
        run: python -m build
      - name: Twine check
        run: twine check dist/*
