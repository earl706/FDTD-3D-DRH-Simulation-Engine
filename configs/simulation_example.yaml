# Example simulation defaults for fdtd_brain_simulation_engine.py
#
# Usage (from CODE/ or repo root with PYTHONPATH=CODE):
#   python fdtd_brain_simulation_engine.py --config configs/simulation_example.yaml --modalities-dir dataset/validation_data/001
#
# Keys must match argparse destination names (snake_case). Nested sections are flattened.
# CLI arguments always override values from this file.

anatomy: brain
max_dim: 80
time_steps: 1000
dx_mm: 10.0
courant_factor: 0.99
air_padding_cells: 10

pulse_type: gaussian
pulse_amplitude: 1000.0
pulse_freq: 100000000.0
prop_direction: '+y'

stream_frames: true
stream_frame_interval: 1
skip_animations: false
# Uncomment for antenna optimization (mutually exclusive with quadrant_fixed in YAML or CLI)
# optimize_antenna: true
# f0: 100000000.0
# opt_time_steps: 700
# opt_penalty_weight: 0.1

# Grouped example (flattened into top-level keys)
# antenna:
#   f0: 100000000.0
#   opt_source_scale: 1.0
