# Paper bundle: Gaussian baseline (Results chapter). Animations skipped for speed.
# Run via run_paper_bundle.py or:
#   python fdtd_brain_simulation_engine.py --config configs/paper_results_gaussian.yaml \
#     --modalities-dir <BraTS_DIR> --results-dir <OUT>
#
# Override modalities_dir on CLI when using the bundle driver.

anatomy: brain
max_dim: 80
time_steps: 1000
dx_mm: 10.0
courant_factor: 0.99
air_padding_cells: 10

pulse_type: gaussian
pulse_amplitude: 100.0
pulse_freq: 100000000.0
prop_direction: '+y'

stream_frames: true
stream_frame_interval: 1
skip_animations: true
slice_timestep_images: false
